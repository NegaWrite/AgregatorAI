<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator - AI Agregator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0d0d12; color: #e0e0e5; min-height: 100vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; border-bottom: 1px solid #1a1a24; }
        .header a { color: #a0a0b0; text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
        .header a:hover { color: #e0e0e5; }
        .header svg { width: 18px; height: 18px; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        h1 { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: #6a6a7a; text-align: center; margin-bottom: 2rem; }
        
        .translator-box { display: flex; flex-direction: column; gap: 1rem; }
        
        .lang-selector { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .lang-selector select { padding: 0.75rem 1.5rem; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 10px; color: #e0e0e5; font-size: 0.95rem; cursor: pointer; min-width: 150px; }
        .lang-selector select:focus { outline: none; border-color: #6366f1; }
        
        .swap-btn { width: 40px; height: 40px; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 50%; color: #a0a0b0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .swap-btn:hover { background: #6366f1; border-color: #6366f1; color: white; }
        
        .text-areas { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        @media (max-width: 768px) {
            .text-areas { grid-template-columns: 1fr; }
        }
        
        .text-box { position: relative; }
        .text-box textarea { width: 100%; height: 300px; padding: 1rem; padding-top: 3rem; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 12px; color: #e0e0e5; font-family: inherit; font-size: 1rem; resize: none; line-height: 1.6; }
        .text-box textarea:focus { outline: none; border-color: #6366f1; }
        .text-box textarea::placeholder { color: #5a5a6a; }
        
        .text-box-header { position: absolute; top: 0.75rem; left: 1rem; display: flex; gap: 0.5rem; }
        .text-box-header span { font-size: 0.75rem; color: #6a6a7a; padding: 0.25rem 0.75rem; background: #16161e; border-radius: 6px; }
        .text-box-header span.active { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        
        .clear-btn { position: absolute; top: 0.75rem; right: 0.75rem; width: 28px; height: 28px; background: transparent; border: none; color: #4a4a5a; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .clear-btn:hover { background: #2a2a3a; color: #a0a0b0; }
        
        .actions { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .action-btn { padding: 0.875rem 2rem; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 0.5rem; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
        .action-btn:disabled { background: #2a2a3a; cursor: not-allowed; transform: none; box-shadow: none; }
        .action-btn.secondary { background: #1a1a24; border: 1px solid #2a2a3a; }
        .action-btn.secondary:hover { border-color: #6366f1; box-shadow: none; }
        
        .loading { text-align: center; padding: 1rem; color: #818cf8; display: none; }
        .loading::before { content: ''; width: 16px; height: 16px; border: 2px solid #2a2a3a; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .suggestions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 1.5rem; }
        .suggestion { padding: 0.5rem 1rem; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; color: #a0a0b0; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .suggestion:hover { border-color: #6366f1; color: #e0e0e5; }
        
        .copy-btn { position: absolute; bottom: 0.75rem; right: 0.75rem; padding: 0.5rem 1rem; background: #16161e; border: 1px solid #2a2a3a; border-radius: 6px; color: #a0a0b0; font-size: 0.8rem; cursor: pointer; opacity: 0; transition: all 0.2s; }
        .text-box:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { border-color: #6366f1; color: #e0e0e5; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            На главную
        </a>
        <a href="/app">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Чат
        </a>
    </div>
    
    <div class="container">
        <h1>🌐 AI Translator</h1>
        <p class="subtitle">Переводите текст с помощью AI с сохранением контекста и стиля</p>
        
        <div class="translator-box">
            <div class="lang-selector">
                <select id="from-lang">
                    <option value="auto">Автоопределение</option>
                    <option value="en" selected>English</option>
                    <option value="ru">Русский</option>
                    <option value="de">Deutsch</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Português</option>
                    <option value="zh">中文</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="ar">العربية</option>
                    <option value="hi">हिन्दी</option>
                    <option value="tr">Türkçe</option>
                    <option value="pl">Polski</option>
                    <option value="uk">Українська</option>
                </select>
                
                <button class="swap-btn" onclick="swapLanguages()" title="Поменять языки">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
                </button>
                
                <select id="to-lang">
                    <option value="en">English</option>
                    <option value="ru" selected>Русский</option>
                    <option value="de">Deutsch</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Português</option>
                    <option value="zh">中文</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="ar">العربية</option>
                    <option value="hi">हिन्दी</option>
                    <option value="tr">Türkçe</option>
                    <option value="pl">Polski</option>
                    <option value="uk">Українська</option>
                </select>
            </div>
            
            <div class="text-areas">
                <div class="text-box">
                    <div class="text-box-header">
                        <span id="from-label">EN</span>
                    </div>
                    <button class="clear-btn" onclick="clearInput()" title="Очистить">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                    <textarea id="input-text" placeholder="Введите текст для перевода..."></textarea>
                </div>
                
                <div class="text-box">
                    <div class="text-box-header">
                        <span id="to-label">RU</span>
                    </div>
                    <button class="copy-btn" onclick="copyTranslation()">Копировать</button>
                    <textarea id="output-text" placeholder="Перевод появится здесь..." readonly></textarea>
                </div>
            </div>
            
            <div class="loading" id="loading">Перевод...</div>
            
            <div class="actions">
                <button class="action-btn" id="translate-btn" onclick="translate()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2v3"/><path d="M11 19l4-9 4 9M14 15h4"/></svg>
                    Перевести
                </button>
                <button class="action-btn secondary" onclick="clearAll()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Очистить всё
                </button>
            </div>
            
            <div class="suggestions">
                <span style="color: #6a6a7a; font-size: 0.85rem;">Быстрые фразы:</span>
                <span class="suggestion" onclick="setText('Hello, how are you?')">Приветствие</span>
                <span class="suggestion" onclick="setText('Thank you for your help!')">Благодарность</span>
                <span class="suggestion" onclick="setText('Can you help me with this task?')">Просьба о помощи</span>
                <span class="suggestion" onclick="setText('The weather is beautiful today.')">О погоде</span>
            </div>
        </div>
    </div>
    
    <script src="/config.js"></script>
    <script>
        const LANG_NAMES = {
            'auto': 'Auto', 'en': 'EN', 'ru': 'RU', 'de': 'DE', 'fr': 'FR',
            'es': 'ES', 'it': 'IT', 'pt': 'PT', 'zh': 'ZH', 'ja': 'JA',
            'ko': 'KO', 'ar': 'AR', 'hi': 'HI', 'tr': 'TR', 'pl': 'PL', 'uk': 'UK'
        };
        
        function updateLabels() {
            const fromLang = document.getElementById('from-lang').value;
            const toLang = document.getElementById('to-lang').value;
            document.getElementById('from-label').textContent = LANG_NAMES[fromLang] || fromLang.toUpperCase();
            document.getElementById('to-label').textContent = LANG_NAMES[toLang] || toLang.toUpperCase();
        }
        
        document.getElementById('from-lang').addEventListener('change', updateLabels);
        document.getElementById('to-lang').addEventListener('change', updateLabels);
        updateLabels();
        
        function swapLanguages() {
            const fromSelect = document.getElementById('from-lang');
            const toSelect = document.getElementById('to-lang');
            const inputText = document.getElementById('input-text');
            const outputText = document.getElementById('output-text');
            
            if (fromSelect.value === 'auto') return;
            
            const tempLang = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = tempLang;
            
            const tempText = inputText.value;
            inputText.value = outputText.value;
            outputText.value = tempText;
            
            updateLabels();
        }
        
        function setText(text) {
            document.getElementById('input-text').value = text;
            translate();
        }
        
        function clearInput() {
            document.getElementById('input-text').value = '';
            document.getElementById('input-text').focus();
        }
        
        function clearAll() {
            document.getElementById('input-text').value = '';
            document.getElementById('output-text').value = '';
        }
        
        function copyTranslation() {
            const text = document.getElementById('output-text').value;
            if (text) {
                navigator.clipboard.writeText(text);
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Скопировано!';
                setTimeout(() => btn.textContent = 'Копировать', 1500);
            }
        }
        
        let translateController = null;
        
        async function translate() {
            const inputText = document.getElementById('input-text').value.trim();
            const outputText = document.getElementById('output-text');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('translate-btn');
            
            if (!inputText) {
                outputText.value = '';
                return;
            }
            
            if (translateController) {
                translateController.abort();
            }
            translateController = new AbortController();
            
            btn.disabled = true;
            loading.style.display = 'block';
            outputText.value = '';
            
            const fromLang = document.getElementById('from-lang').value;
            const toLang = document.getElementById('to-lang').value;
            
            const langPrompt = fromLang === 'auto' 
                ? `Translate the following text to ${LANG_NAMES[toLang] || toLang}. Detect the source language automatically.`
                : `Translate the following text from ${LANG_NAMES[fromLang] || fromLang} to ${LANG_NAMES[toLang] || toLang}. Preserve the tone and style.`;
            
            const systemPrompt = `You are a professional translator. ${langPrompt}

Rules:
- Preserve formatting (paragraphs, line breaks)
- Keep technical terms in original language if no standard translation exists
- Maintain the original tone (formal/informal)
- Do NOT add explanations or notes
- Output ONLY the translation`;
            
            try {
                const data = await API.post('/api/music-chat', {
                    prompt: inputText,
                    system: systemPrompt,
                    model: 'llama3'
                });
                
                outputText.value = data.response.trim();
            } catch (e) {
                if (e.name !== 'AbortError') {
                    outputText.value = 'Ошибка перевода: ' + e.message;
                }
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        let debounceTimer = null;
        document.getElementById('input-text').addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(translate, 1000);
        });
    </script>
</body>
</html>
